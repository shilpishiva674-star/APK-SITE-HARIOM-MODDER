<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HARIOM MODDER - User Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { background: #0f172a; color: #e2e8f0; }
      .navbar { background: #1e293b; padding: 1rem; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #334155; }
      .logo { font-size: 1.5rem; font-weight: bold; color: #38bdf8; }
      .nav-right { display: flex; gap: 1rem; align-items: center; }
      .balance { background: #334155; padding: 8px 16px; border-radius: 20px; }
      .btn-logout { background: #f87171; color: #fff; padding: 8px 16px; border-radius: 8px; cursor: pointer; border: none; }
      .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
      .auth-box { max-width: 400px; margin: 5rem auto; background: #1e293b; padding: 2rem; border-radius: 12px; border: 1px solid #334155; }
      .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
      .card { background: #1e293b; border-radius: 12px; padding: 1.5rem; border: 1px solid #334155; margin-bottom: 1rem; }
        h2 { color: #38bdf8; margin-bottom: 1rem; }
        input, select, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: #e2e8f0; font-size: 16px; }
        button { background: #38bdf8; color: #0f172a; font-weight: bold; cursor: pointer; border: none; }
        button:disabled { background: #475569; }
      .tabs { display: flex; gap: 1rem; margin-bottom: 1rem; }
      .tab { padding: 8px 16px; background: #334155; border-radius: 8px; cursor: pointer; }
      .tab.active { background: #38bdf8; color: #0f172a; }
      .order-item { background: #0f172a; padding: 10px; margin: 8px 0; border-radius: 8px; border-left: 3px solid #38bdf8; }
      .status-Pending { color: #facc15; }
      .status-In.progress { color: #38bdf8; }
      .status-Completed { color: #4ade80; }
      .status-Canceled { color: #f87171; }
      .hidden { display: none; }
      .loader { border: 3px solid #334155; border-top: 3px solid #38bdf8; border-radius: 50%; width: 18px; height: 18px; animation: spin 1s linear infinite; display: inline-block; }
       @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @media(max-width: 768px) {.grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <!-- LOGIN -->
    <div id="authSection">
        <div class="auth-box">
            <div class="tabs">
                <div class="tab active" onclick="showAuth('login')">Login</div>
                <div class="tab" onclick="showAuth('register')">Register</div>
            </div>
            <div id="loginForm">
                <h2>Login</h2>
                <input type="email" id="loginEmail" placeholder="Email">
                <input type="password" id="loginPassword" placeholder="Password">
                <button onclick="loginUser()">Login</button>
            </div>
            <div id="registerForm" class="hidden">
                <h2>Register</h2>
                <input type="text" id="regName" placeholder="Full Name">
                <input type="email" id="regEmail" placeholder="Email">
                <input type="password" id="regPassword" placeholder="Password">
                <button onclick="registerUser()">Create Account</button>
            </div>
        </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden">
        <div class="navbar">
            <div class="logo">⚡ HARIOM MODDER</div>
            <div class="nav-right">
                <div>Hi, <span id="userName"></span></div>
                <div class="balance">Balance: $<span id="userBalance">0.00</span></div>
                <button class="btn-logout" onclick="logout()">Logout</button>
            </div>
        </div>
        <div class="container">
            <div class="grid">
                <div class="card">
                    <h2>New Order</h2>
                    <select id="category" onchange="filterServices()"><option value="">Select Category</option></select>
                    <select id="service" onchange="showServiceInfo()"><option value="">Select Service</option></select>
                    <div style="font-size:12px;color:#94a3b8;" id="serviceDetails"></div>
                    <input type="text" id="link" placeholder="Link">
                    <input type="number" id="quantity" placeholder="Quantity" oninput="calcCost()">
                    <p>Your Price: $<span id="totalCost">0.0000</span></p>
                    <button id="orderBtn" onclick="placeOrder()">Place Order</button>
                </div>
                <div class="card">
                    <div class="tabs">
                        <div class="tab active" onclick="showTab('services')">Services</div>
                        <div class="tab" onclick="showTab('orders')">My Orders</div>
                    </div>
                    <div id="servicesTab"><div id="servicesTableBody"></div></div>
                    <div id="ordersTab" class="hidden"><div id="orderList"></div></div>
                </div>
            </div>
        </div>
    </div>

<script>
const API_URL = 'https://gurusmmpanels.com/api/v2';
const PROFIT_MARGIN = 1.5; // 50% profit
let currentUser = null;
let allServices = [];

// ADMIN PANEL SE API KEY AUR SERVICES LOAD HONGE
function getConfig() {
    return JSON.parse(localStorage.getItem('siteConfig') || '{"apiKey":"","services":[]}');
}

async function apiCall(params) {
    let config = getConfig();
    if(!config.apiKey) return {error: 'API Key not set by admin'};
    
    let formData = new FormData();
    formData.append('key', config.apiKey);
    for(let key in params) formData.append(key, params[key]);
    
    try {
        let res = await fetch(API_URL, { method: 'POST', body: formData });
        return await res.json();
    } catch(e) {
        let res = await fetch('https://corsproxy.io/?' + encodeURIComponent(API_URL), { method: 'POST', body: formData });
        return await res.json();
    }
}

function init() {
    let loggedInEmail = sessionStorage.getItem('loggedInUser');
    if(loggedInEmail) {
        let users = JSON.parse(localStorage.getItem('panelUsers') || '[]');
        currentUser = users.find(u => u.email === loggedInEmail);
        if(currentUser) showDashboard();
    }
    loadServicesFromAdmin();
}

function showAuth(type) {
    document.getElementById('loginForm').classList.toggle('hidden', type!== 'login');
    document.getElementById('registerForm').classList.toggle('hidden', type!== 'register');
    document.querySelectorAll('#authSection.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
}

function registerUser() {
    let name = document.getElementById('regName').value;
    let email = document.getElementById('regEmail').value.toLowerCase();
    let pass = document.getElementById('regPassword').value;
    if(!name ||!email ||!pass) return alert('Sab field bhar');
    
    let users = JSON.parse(localStorage.getItem('panelUsers') || '[]');
    if(users.find(u => u.email === email)) return alert('Email already registered');
    
    users.push({ id: Date.now(), name, email, password: pass, balance: 0, joinDate: new Date().toLocaleString() });
    localStorage.setItem('panelUsers', JSON.stringify(users));
    alert('Account Created! Ab Login kar');
    showAuth('login');
}

function loginUser() {
    let email = document.getElementById('loginEmail').value.toLowerCase();
    let pass = document.getElementById('loginPassword').value;
    let users = JSON.parse(localStorage.getItem('panelUsers') || '[]');
    let user = users.find(u => u.email === email && u.password === pass);
    if(!user) return alert('Wrong Email/Password');
    currentUser = user;
    sessionStorage.setItem('loggedInUser', user.email);
    showDashboard();
}

function showDashboard() {
    document.getElementById('authSection').classList.add('hidden');
    document.getElementById('dashboard').classList.remove('hidden');
    updateUserData();
    loadOrders();
}

function updateUserData() {
    let users = JSON.parse(localStorage.getItem('panelUsers') || '[]');
    currentUser = users.find(u => u.email === currentUser.email);
    document.getElementById('userName').innerText = currentUser.name;
    document.getElementById('userBalance').innerText = currentUser.balance.toFixed(4);
}

function logout() {
    sessionStorage.removeItem('loggedInUser');
    location.reload();
}

function loadServicesFromAdmin() {
    let config = getConfig();
    allServices = config.services || [];
    let categories = new Set(allServices.map(s => s.category));
    
    let catSelect = document.getElementById('category');
    catSelect.innerHTML = '<option value="">All Categories</option>';
    categories.forEach(c => catSelect.innerHTML += `<option value="${c}">${c}</option>`);
    
    filterServices();
    document.getElementById('servicesTableBody').innerHTML = allServices.map(s => 
        `<p><b>${s.name}</b> - $${s.sell_rate}/1K</p>`
    ).join('');
}

function filterServices() {
    let cat = document.getElementById('category').value;
    let serviceSelect = document.getElementById('service');
    serviceSelect.innerHTML = '<option value="">Select Service</option>';
    
    let filtered = cat? allServices.filter(s => s.category === cat) : allServices;
    filtered.forEach(s => {
        serviceSelect.innerHTML += `<option value="${s.service}" data-rate="${s.rate}" data-sell="${s.sell_rate}" data-min="${s.min}" data-max="${s.max}">${s.service} - ${s.name}</option>`;
    });
}

function showServiceInfo() {
    let opt = document.getElementById('service').selectedOptions[0];
    if(!opt.value) return;
    document.getElementById('serviceDetails').innerHTML = `Rate: $${opt.dataset.sell}/1K | Min: ${opt.dataset.min} | Max: ${opt.dataset.max}`;
    calcCost();
}

function calcCost() {
    let opt = document.getElementById('service').selectedOptions[0];
    let qty = document.getElementById('quantity').value;
    let sellRate = opt?.dataset.sell || 0;
    document.getElementById('totalCost').innerText = (qty / 1000 * sellRate).toFixed(4);
}

async function placeOrder() {
    let service = document.getElementById('service').value;
    let link = document.getElementById('link').value;
    let qty = parseInt(document.getElementById('quantity').value);
    if(!service ||!link ||!qty) return alert('Sab bhar bhai');
    
    let opt = document.getElementById('service').selectedOptions[0];
    let sellRate = parseFloat(opt.dataset.sell);
    let cost = qty / 1000 * sellRate;
    
    if(cost > currentUser.balance) return alert('Balance kam hai. Admin se add karwao.');
    
    let btn = document.getElementById('orderBtn');
    btn.disabled = true;
    btn.innerHTML = '<div class="loader"></div> Placing...';
    
    let data = await apiCall({action: 'add', service: service, link: link, quantity: qty});
    
    if(data.order) {
        // Balance deduct
        let users = JSON.parse(localStorage.getItem('panelUsers'));
        let userIndex = users.findIndex(u => u.email === currentUser.email);
        users[userIndex].balance -= cost;
        localStorage.setItem('panelUsers', JSON.stringify(users));
        
        // Order save
        let orders = JSON.parse(localStorage.getItem('panelOrders') || '[]');
        orders.unshift({ id: data.order, userEmail: currentUser.email, service, link, qty, cost, status: 'Pending', date: new Date().toLocaleString() });
        localStorage.setItem('panelOrders', JSON.stringify(orders));
        
        alert('Order Success! ID: ' + data.order);
        updateUserData();
        loadOrders();
    } else {
        alert('Order Failed: ' + (data.error || 'Unknown'));
    }
    
    btn.disabled = false;
    btn.innerHTML = 'Place Order';
}

function loadOrders() {
    let orders = JSON.parse(localStorage.getItem('panelOrders') || '[]');
    let myOrders = orders.filter(o => o.userEmail === currentUser.email);
    document.getElementById('orderList').innerHTML = myOrders.map(o => `
        <div class="order-item">
            <b>#${o.id}</b> - Service: ${o.service}<br>
            Qty: ${o.qty} | Cost: $${o.cost.toFixed(4)} | <span class="status-${o.status.replace(' ','.')}">${o.status}</span><br>
            <small>${o.date}</small>
        </div>
    `).join('') || '<p>No orders yet</p>';
}

function showTab(tab) {
    document.getElementById('servicesTab').classList.toggle('hidden', tab!== 'services');
    document.getElementById('ordersTab').classList.toggle('hidden', tab!== 'orders');
    document.querySelectorAll('#dashboard.tab').forEach(t => t.classList.remove('active'));
    event.target.classList.add('active');
}

init();
setInterval(() => { if(currentUser) updateUserData(); }, 5000);
</script>
</body>
</html>
